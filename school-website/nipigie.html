<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wasiliana na Sekondari Nyamwigura | Tarime</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            /* Background ya Bendera ya Taifa (Gradient Layout) */
            background: linear-gradient(135deg, 
                #1eb53a 0%, #1eb53a 30%, 
                #fcd116 30%, #fcd116 35%, 
                #000000 35%, #000000 65%, 
                #fcd116 65%, #fcd116 70%, 
                #00a3dd 70%, #00a3dd 100%
            );
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .main-wrapper {
            display: flex;
            flex-direction: row;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 25px;
            overflow: hidden;
            max-width: 1100px;
            width: 100%;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        /* Upande wa Kushoto: Taarifa na Ramani ya Nyamwigura */
        .info-section {
            flex: 1.2;
            padding: 40px;
            color: white;
            background: rgba(0, 0, 0, 0.4);
        }

        .info-section h2 { 
            font-size: 1.8rem; 
            margin-bottom: 10px;
            color: #fcd116; 
        }

        .info-section p.sub-text {
            margin-bottom: 25px;
            font-style: italic;
            border-left: 3px solid #1eb53a;
            padding-left: 10px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            margin-bottom: 18px;
            font-size: 1rem;
        }

        .contact-item i {
            margin-right: 15px;
            color: #fcd116;
            width: 25px;
            text-align: center;
        }

        .map-container {
            margin-top: 25px;
            border-radius: 15px;
            overflow: hidden;
            border: 3px solid rgba(255,255,255,0.2);
            height: 250px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        /* Upande wa Kulia: Fomu na Social Media */
        .form-section {
            flex: 1;
            padding: 40px;
            background: rgba(255, 255, 255, 0.98);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .form-section h3 {
            color: #000;
            margin-bottom: 20px;
            font-size: 1.4rem;
            text-transform: uppercase;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
            background: #f9f9f9;
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            background: #1eb53a;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #000;
            color: #fcd116;
            transform: translateY(-3px);
        }

        .social-icons {
            margin-top: 30px;
            text-align: center;
        }

        .social-icons a {
            font-size: 1.5rem;
            margin: 0 10px;
            color: #333;
            transition: 0.3s;
        }

        .social-icons a:hover {
            color: #00a3dd;
        }

        @media (max-width: 850px) {
            .main-wrapper { flex-direction: column; }
            .info-section, .form-section { padding: 30px; }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="info-section">
            <h2>Nyamwigura Secondary School</h2>
            <p class="sub-text">"Elimu ni Mwanga, Tarime ni Nyumbani"</p>
            
            <div class="contact-item">
                <i class="fas fa-map-marker-alt"></i>
                <span>Nyamwigura, Tarime - Mara, Tanzania</span>
            </div>
            
            <div class="contact-item">
                <i class="fas fa-phone-alt"></i>
                <span>+255 7XX XXX XXX (Ofisi)</span>
            </div>
            
            <div class="contact-item">
                <i class="fas fa-envelope"></i>
                <span>info@nyamwigurasec.ac.tz</span>
            </div>

            <div class="map-container">
                <iframe 
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d15953.51139454154!2d34.3986423!3d-1.4234567!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x182df58348877e8b%3A0x868b8e66e6b0a88b!2sNyamwigura%2C%20Tarime!5e0!3m2!1sen!2stz!4v1700000000000!5m2!1sen!2stz" 
                    width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy">
                </iframe>
            </div>
        </div>

        <div class="form-section">
            <h3>Tutumie Ujumbe</h3>
            <form>
                <input type="text" placeholder="Jina lako..." required>
                <input type="email" placeholder="Barua pepe..." required>
                <textarea placeholder="Andika ujumbe wako kwa uongozi wa shule..."></textarea>
                <button type="submit">TUMA SASA <i class="fas fa-paper-plane"></i></button>
            </form>

            <div class="social-icons">
                <p style="color: #666; font-size: 0.8rem; margin-bottom: 10px;">Tufuate mitandaoni:</p>
                <a href="#"><i class="fab fa-facebook"></i></a>
                <a href="#"><i class="fab fa-instagram"></i></a>
                <a href="#"><i class="fab fa-twitter"></i></a>
                <a href="#"><i class="fab fa-whatsapp"></i></a>
            </div>
        </div>
    </div>

</body>
</html>
